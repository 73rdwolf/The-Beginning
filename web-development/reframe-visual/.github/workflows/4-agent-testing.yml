name: Universal 4-Agent Testing Framework

on:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Install ts-node
      run: npm install -g ts-node typescript

    - name: 🛑 Phase A: Sanity Check (Agent 1 & 4)
      run: |
        echo "Running Architectural Integrity and Leak audits..."
        # ts-node tests/4-agent-orchestrator.ts (Phase A logic)

    - name: 🌪️ Phase B: Interaction & Chaos (Agent 2 & 3)
      run: |
        echo "Running Chaos Resilience and UX/Psychology audits..."
        # ts-node tests/4-agent-orchestrator.ts (Phase B logic)
        
    - name: 📊 Phase C: Post-Mortem Report
      run: ts-node tests/4-agent-orchestrator.ts

    - name: Upload Test Metrics Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: 4-agent-test-results
        path: tests/metrics/
